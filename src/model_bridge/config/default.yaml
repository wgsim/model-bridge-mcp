commands:
  codex:
    exec: ["codex", "exec", "--skip-git-repo-check"]
    health: ["codex", "--version"]
  gemini:
    exec: ["gemini"]
    health: ["gemini", "--version"]
  ollama:
    exec: ["ollama", "run"]
    health: ["ollama", "--version"]
  claude_code:
    exec: ["claude", "-p"]
    health: ["claude", "--version"]

routing:
  default_chains:
    ask_chatgpt_cli: ["codex", "gemini", "ollama"]
    ask_gemini_cli: ["gemini", "codex", "ollama"]
    ask_ollama_cloud_fallback: ["codex", "gemini"]

models:
  ollama_default_model: "gpt-oss:20b"
  ollama_final_backup_model: "qwen3-coder-next:Q4_K_M"
  ollama_catalog:
    - "gpt-oss:20b"
    - "glm-4.7-flash:Q8_0"
    - "qwen3-coder-next:Q4_K_M"
  ollama_aliases:
    default: "gpt-oss:20b"
    fast: "glm-4.7-flash:Q8_0"
    coder: "qwen3-coder-next:Q4_K_M"
  ollama_local_fallback_chain:
    - "default"
    - "coder"

security:
  block_patterns:
    - "rm\\s+(-r[a-zA-Z]*f|-f[a-zA-Z]*r)\\s+"
    - "mkfs\\."
    - ":\\(\\)\\s*\\{\\s*:\\s*\\|\\s*:\\s*&"
    - "dd\\s+if="
    - "chmod\\s+777"
  sensitive_paths:
    - "/etc/"
    - "/var/"
    - "/boot/"
    - "/proc/"
    - "/root/"

runtime:
  system_suffix: "\n\n[SYSTEM INSTRUCTION: Return raw code/text only. Do NOT use emojis. Do NOT use markdown code blocks.]"
  subprocess_timeout_seconds: 120
  ollama_timeout_seconds: 300
  ask_defaults:
    timeout_seconds: 120
    max_output_tokens: 0
    response_format: "text"
    verbosity: "normal"
    stream: false
  prompt_cache_enabled: true
  prompt_cache_ttl_seconds: 300
  prompt_cache_max_entries: 256
  session_memory_enabled: false
  session_memory_ttl_seconds: 1800
  session_memory_max_turns: 6
  auto_routing_short_prompt_threshold: 120
  apply_system_suffix:
    codex: true
    gemini: true
    ollama: false
    claude_code: true
