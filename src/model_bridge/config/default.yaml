commands:
  codex:
    exec: ["codex", "exec", "--skip-git-repo-check"]
    health: ["codex", "--version"]
  gemini:
    exec: ["gemini", "-p"]
    health: ["gemini", "--version"]
  ollama:
    exec: ["ollama", "run"]
    health: ["ollama", "--version"]
  claude_code:
    exec: ["claude", "-p"]
    health: ["claude", "--version"]

routing:
  default_chains:
    ask_chatgpt_cli: ["codex", "gemini", "ollama"]
    ask_gemini_cli: ["gemini", "codex", "ollama"]
    ask_ollama_cloud_fallback: ["codex", "gemini"]

models:
  ollama_default_model: "gpt-oss:20b"
  ollama_final_backup_model: "qwen3-coder-next:Q4_K_M"
  ollama_catalog:
    - "gpt-oss:20b"
    - "glm-4.7-flash:Q8_0"
    - "qwen3-coder-next:Q4_K_M"
  ollama_aliases:
    default: "gpt-oss:20b"
    fast: "glm-4.7-flash:Q8_0"
    coder: "qwen3-coder-next:Q4_K_M"
  ollama_local_fallback_chain:
    - "default"
    - "coder"
  codex_model_catalog:
    - "gpt-5.1-codex-mini"
    - "gpt-5.1-codex-max"
    - "gpt-5.2"
    - "gpt-5.2-codex"
    - "gpt-5.3-codex"
  gemini_model_catalog:
    - "gemini-2.5-flash-lite"
    - "gemini-2.5-flash"
    - "gemini-2.5-pro"
    - "gemini-3-flash-preview"
    - "gemini-3-pro-preview"
  claude_code_model_catalog:
    - "haiku"
    - "sonnet"
    - "opus"

security:
  block_patterns:
    - "rm\\s+(-r[a-zA-Z]*f|-f[a-zA-Z]*r)\\s+"
    - "mkfs\\."
    - ":\\(\\)\\s*\\{\\s*:\\s*\\|\\s*:\\s*&"
    - "dd\\s+if="
    - "chmod\\s+777"
  sensitive_paths:
    - "/etc/"
    - "/var/"
    - "/boot/"
    - "/proc/"
    - "/root/"

runtime:
  system_suffix: "\n\n[SYSTEM INSTRUCTION: Return raw code/text only. Do NOT use emojis. Do NOT use markdown code blocks.]"
  subprocess_timeout_seconds: 120
  ollama_timeout_seconds: 300
  ask_defaults:
    timeout_seconds: 120
    max_output_tokens: 0
    response_format: "text"
    verbosity: "normal"
    stream: false
  prompt_cache_enabled: true
  prompt_cache_ttl_seconds: 300
  prompt_cache_max_entries: 256
  session_memory_enabled: false
  session_memory_ttl_seconds: 1800
  session_memory_max_turns: 6
  auto_routing_short_prompt_threshold: 120
  ollama_resource_guard_enabled: true
  ollama_resource_guard_default_max_concurrency: 1
  ollama_resource_guard_hard_cap: 2
  ollama_resource_guard_safety_factor: 0.6
  ollama_resource_guard_reserve_ram_gb: 2.0
  ollama_model_memory_gb:
    "gpt-oss:20b": 18.0
    "glm-4.7-flash:Q8_0": 6.0
    "qwen3-coder-next:Q4_K_M": 10.0
  apply_system_suffix:
    codex: true
    gemini: true
    ollama: false
    claude_code: true
